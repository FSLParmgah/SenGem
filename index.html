<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سين جيم</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: purple; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .question-box { background-color: #3498db; color: white; padding: 20px; border-radius: 8px; margin: 20px 0; font-size: 1.2em; }
        .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .option { background-color: #ecf0f1; padding: 15px; border-radius: 8px; cursor: pointer; border: 2px solid #bdc3c7; }
        .option:hover { background-color: #d6eaf8; }
        .correct { background-color: #2ecc71; color: white; }
        .wrong { background-color: #e74c3c; color: white; }
        .controls { margin: 20px 0; }
        select, button { padding: 10px 20px; font-size: 1em; border-radius: 5px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>سين جيم</h1>
        
        <!-- اختيار المجال -->
        <div id="setup-screen">
            <h3>اختر مجال الأسئلة:</h3>
            <select id="category-select">
                <option value="الكل">جميع المجالات</option>
                <option value="معلومات عامة">معلومات عامة</option>
                <option value="جغرافيا">جغرافيا</option>
                <option value="تاريخ">تاريخ</option>
                <option value="علوم">علوم</option>
            </select>
            <br><br>
            <button onclick="startGame()">ابدأ اللعب</button>
        </div>

        <!-- اللعبة -->
        <div id="game-screen" class="hidden">
            <div class="stats">النقاط: <span id="score">0</span></div>
            <div class="question-box" id="question"></div>
            <div class="options-container" id="options"></div>
            <button id="nextQuestion">سؤال جديد</button>
            <button onclick="location.reload()">تغيير المجال</button>
        </div>
    </div>

    <script>
        const questions = [
            { question: "ما هي عاصمة فرنسا؟", answer: "باريس", options: ["لندن", "برلين", "باريس", "روما"], category: "معلومات عامة" },
            { question: "ما هو أطول نهر في العالم؟", answer: "نهر النيل", options: ["نهر الأمازون", "نهر النيل", "نهر اليانغتسي", "نهر المسيسيبي"], category: "جغرافيا" },
            { question: "في أي عام وقعت الحرب العالمية الثانية؟", answer: "1939", options: ["1914", "1939", "1945", "1923"], category: "تاريخ" },
            { question: "ما هو العنصر الكيميائي الذي رمزه 'O'؟", answer: "الأكسجين", options: ["الذهب", "الأكسجين", "الحديد", "الكربون"], category: "علوم" }
        ];

        let currentQuestion = {};
        let score = 0;
        let selectedCategory = "";

        function startGame() {
            selectedCategory = document.getElementById('category-select').value;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            getNewQuestion();
        }

        function getNewQuestion() {
            let filtered = selectedCategory === "الكل" ? questions : questions.filter(q => q.category === selectedCategory);
            currentQuestion = filtered[Math.floor(Math.random() * filtered.length)];
            
            document.getElementById('question').innerText = currentQuestion.question;
            const optionsElement = document.getElementById('options');
            optionsElement.innerHTML = '';
            
            currentQuestion.options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.innerText = opt;
                btn.onclick = () => {
                    if (opt === currentQuestion.answer) {
                        btn.classList.add('correct');
                        score += 10;
                    } else {
                        btn.classList.add('wrong');
                    }
                    document.getElementById('score').innerText = score;
                };
                optionsElement.appendChild(btn);
            });
        }

        document.getElementById('nextQuestion').addEventListener('click', getNewQuestion);
    </script>
</body>
</html>
